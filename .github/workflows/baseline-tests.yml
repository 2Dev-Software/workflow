name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: baseline
            command: bash scripts/run-baseline-tests.sh
          - label: phpunit
            command: bash scripts/run-phpunit-tests.sh
          - label: pest
            command: bash scripts/run-pest-tests.sh
          - label: static-analysis
            command: bash scripts/run-static-analysis.sh
          - label: lint
            command: bash scripts/run-php-lint.sh

    name: ${{ matrix.label }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Docker environment
        run: cp .env.docker.example .env.docker

      - name: Build and start stack
        run: docker compose --env-file .env.docker up -d --build

      - name: Run ${{ matrix.label }}
        run: docker compose --env-file .env.docker exec -T app ${{ matrix.command }}

      - name: Print Docker logs on failure
        if: failure()
        run: docker compose --env-file .env.docker logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose --env-file .env.docker down -v
