name: Discord Repository Activity

on:
  push:
  pull_request_target:
    types:
      - opened
      - reopened
      - closed

permissions:
  contents: read
  pull-requests: read

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Send repository activity to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured. Skipping."
            exit 0
          fi

          if [ -z "${GITHUB_EVENT_PATH:-}" ] || [ ! -f "${GITHUB_EVENT_PATH}" ]; then
            echo "GITHUB_EVENT_PATH is not available. Skipping."
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          import urllib.request

          webhook = os.environ["DISCORD_WEBHOOK_URL"].strip()
          if not webhook:
              raise SystemExit(0)

          event_path = os.environ.get("GITHUB_EVENT_PATH", "").strip()
          if not event_path:
              raise SystemExit(0)

          with open(event_path, "r", encoding="utf-8") as fh:
              event = json.load(fh)

          event_name = os.environ.get("EVENT_NAME", "")
          repository = os.environ.get("REPOSITORY", "")
          ref_name = os.environ.get("REF_NAME", "")
          actor = os.environ.get("ACTOR", "")
          server_url = os.environ.get("SERVER_URL", "https://github.com")

          sender = event.get("sender") or {}
          sender_name = sender.get("login") or actor or "GitHub"
          sender_avatar = sender.get("avatar_url") or "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          repo_url = f"{server_url}/{repository}" if repository else server_url

          messages = []
          repo_short = repository.split("/")[-1].strip() if repository else "repository"

          def trim(text, limit):
              text = (text or "").strip()
              if len(text) <= limit:
                  return text
              return text[: limit - 3].rstrip() + "..."

          def join_body(*parts):
              lines = [trim(part, 1500) for part in parts if (part or "").strip()]
              return "\n\n".join(lines)

          def send_embed(headline, *, body="", url=None, color=0x2F6FEB, timestamp=None):
              embed = {
                  "color": color,
                  "title": trim(headline, 256),
                  "author": {
                      "name": sender_name,
                      "icon_url": sender_avatar,
                      "url": repo_url,
                  },
              }
              if body:
                  embed["description"] = trim(body, 3500)
              if url:
                  embed["url"] = url
              if timestamp:
                  embed["timestamp"] = timestamp

              messages.append(
                  {
                      "username": "GitHub",
                      "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
                      "embeds": [embed],
                      "allowed_mentions": {"parse": []},
                  }
              )

          if event_name == "push":
              branch_name = ref_name or (event.get("ref", "").split("/")[-1] if event.get("ref") else "")
              compare_url = event.get("compare") or repo_url
              commits = event.get("commits") or []
              distinct_commits = [commit for commit in commits if not commit.get("distinct") is False]
              push_timestamp = ((event.get("head_commit") or {}).get("timestamp") or "").strip() or None

              if event.get("created") and branch_name:
                  send_embed(
                      f"[{repository}] New branch created: {branch_name}",
                      body="Branch creation event received from GitHub.",
                      url=compare_url,
                      color=0x57606A,
                      timestamp=push_timestamp,
                  )

              if distinct_commits:
                  lines = []
                  for commit in distinct_commits[:5]:
                      commit_id = (commit.get("id") or "")[:7]
                      message = (commit.get("message") or "").splitlines()[0].strip()
                      author_name = ((commit.get("author") or {}).get("name") or sender_name).strip()
                      line = f"`{commit_id}` {trim(message, 120)}"
                      if author_name:
                          line += f" - {author_name}"
                      lines.append(line)

                  extra = len(distinct_commits) - len(lines)
                  if extra > 0:
                      lines.append(f"... and {extra} more commit(s)")

                  noun = "commit" if len(distinct_commits) == 1 else "commits"
                  send_embed(
                      f"[{repo_short}:{branch_name}] {len(distinct_commits)} new {noun}",
                      body="\n".join(lines),
                      url=compare_url,
                      color=0x2F81F7,
                      timestamp=push_timestamp,
                  )

          elif event_name in {"pull_request", "pull_request_target"}:
              pr = event.get("pull_request") or {}
              action = event.get("action") or ""
              number = pr.get("number") or event.get("number")
              title = (pr.get("title") or "").strip()
              html_url = pr.get("html_url") or repo_url
              head_ref = ((pr.get("head") or {}).get("ref") or "").strip()
              base_ref = ((pr.get("base") or {}).get("ref") or "").strip()
              summary = trim((pr.get("body") or "").replace("\r\n", "\n").replace("\r", "\n"), 800)
              pr_title = trim(title or "-", 1024)

              if action in {"opened", "reopened"}:
                  send_embed(
                      f"[{repository}] Pull request opened: #{number} {head_ref}",
                      body=join_body(pr_title, summary),
                      url=html_url,
                      color=0x1F8B4C,
                      timestamp=(pr.get("created_at") or "").strip() or None,
                  )

              elif action == "closed" and pr.get("merged"):
                  merged_by = ((pr.get("merged_by") or {}).get("login") or sender_name).strip()
                  send_embed(
                      f"[{repository}] Pull request merged: #{number} {head_ref} -> {base_ref}",
                      body=join_body(pr_title, f"Merged by {merged_by}" if merged_by else ""),
                      url=html_url,
                      color=0x8250DF,
                      timestamp=(pr.get("merged_at") or pr.get("closed_at") or "").strip() or None,
                  )

          for payload in messages:
              req = urllib.request.Request(
                  webhook,
                  data=json.dumps(payload).encode("utf-8"),
                  headers={
                      "Content-Type": "application/json",
                      "Accept": "application/json",
                      "User-Agent": "GitHubActions-DiscordNotifier/1.0",
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req) as response:
                  if response.status >= 300:
                      raise RuntimeError(f"Discord webhook failed: {response.status}")
          PY
