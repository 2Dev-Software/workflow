services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_HOST: db
      DB_NAME: ${WORKFLOW_DB_NAME:-deebuk_platform}
      DB_USER: ${WORKFLOW_DB_USER:-workflow_user}
      DB_PASS: ${WORKFLOW_DB_PASSWORD:-workflow_pass}
      DB_CHARSET: utf8mb4
      DB_PORT: 3306
      TZ: Asia/Bangkok
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www/html
    restart: unless-stopped

  db:
    image: mariadb:11.4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --skip-name-resolve
    environment:
      MARIADB_DATABASE: ${WORKFLOW_DB_NAME:-deebuk_platform}
      MARIADB_USER: ${WORKFLOW_DB_USER:-workflow_user}
      MARIADB_PASSWORD: ${WORKFLOW_DB_PASSWORD:-workflow_pass}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-workflow_root_password}
      TZ: Asia/Bangkok
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    ports:
      - "${DB_PORT_HOST:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/initdb:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

volumes:
  db_data:
